<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SİSTEM PROTOKOLÜ: SAHA OPERASYONU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            background-color: #050505;
            color: #0f0;
            font-family: 'VT323', monospace;
            margin: 0;
            /* FIX #1: removed overflow:hidden from body so inner scroll containers can work */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 5px #0f0;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
            opacity: 0.6;
        }

        .flicker {
            animation: flicker 0.15s infinite;
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 255, 0, 0.02);
            z-index: 49;
        }

        @keyframes flicker {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }

        .glitch-text {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }

        .cursor-blink {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #0f0; }

        input {
            background: transparent;
            border: none;
            color: #0f0;
            outline: none;
            font-family: 'VT323', monospace;
            text-transform: uppercase;
            width: 100%;
            text-shadow: 0 0 5px #0f0;
        }

        input::placeholder { color: #050; }

        .crt-overlay {
            box-shadow: inset 0 0 100px rgba(0,255,0,0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 48;
        }

        .tv-shell {
            position: relative;
            width: min(100%, 1100px);
            /* FIX #2: give the shell a fixed height so inner scroll works */
            height: 90vh;
            margin: 0 auto;
            padding: 2rem;
            border: 4px solid rgba(0,255,0,0.65);
            border-radius: 34px;
            background: radial-gradient(circle at top, rgba(0,255,0,0.08), rgba(0,0,0,0.96));
            box-shadow: 0 0 80px rgba(0,255,0,0.25), inset 0 0 60px rgba(0,255,0,0.08);
            overflow: hidden;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .tv-shell::before,
        .tv-shell::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 12px;
            border-radius: 999px;
            background: rgba(0,255,0,0.15);
            box-shadow: inset 0 0 10px rgba(0,255,0,0.25);
        }

        .tv-shell::before { top: 8px; width: 60%; }
        .tv-shell::after  { bottom: 8px; width: 50%; }

        .tv-panel {
            position: relative;
            border: 2px solid rgba(0,255,0,0.5);
            border-radius: 24px;
            padding: 1.5rem;
            background: rgba(0,0,0,0.92);
            box-shadow: inset 0 0 50px rgba(0,255,0,0.08);
            /* FIX #2 cont.: panel fills shell and scrolls internally */
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* FIX #7: transition defined on the element itself, not only in compound selector */
            transition: transform 0.8s ease-in, opacity 0.8s ease-in, filter 0.8s ease-in;
        }

        /* FIX #7: power-off now works because transition is declared above on .tv-panel */
        .tv-shell.power-off .tv-panel {
            transform: scaleY(0.15) translateY(35%);
            opacity: 0.15;
            filter: blur(1px);
        }

        #app {
            /* FIX #2 cont.: #app is the true scroll container */
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            font-size: clamp(1rem, 2vw, 1.4rem);
        }

        .tv-screen-glow {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at center, rgba(0,255,0,0.08), transparent 40%);
            z-index: 5;
        }

        .tv-close-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #0f0;
            background: rgba(0,0,0,0.92);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.45s ease;
            z-index: 60;
        }

        .tv-close-overlay.active { opacity: 1; }

        .tv-close-screen {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.8));
            mix-blend-mode: overlay;
            opacity: 0.45;
            animation: tvstatic 0.15s infinite alternate;
            z-index: 59;
        }

        .tv-close-content {
            position: relative;
            z-index: 61;
            max-width: 90%;
        }

        @keyframes tvstatic {
            from { opacity: 0.35; }
            to { opacity: 0.55; transform: translateY(-2px); }
        }

        .btn-terminal {
            border: 1px solid #0f0;
            background: rgba(0, 255, 0, 0.1);
            color: #0f0;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-terminal:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 15px #0f0;
        }

        .btn-terminal:disabled {
            border-color: #050;
            color: #050;
            background: transparent;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="flicker"></div>
    <div class="crt-overlay"></div>

    <div class="tv-shell">
        <div class="tv-panel">
            <div id="app"></div>
            <div class="tv-screen-glow"></div>
        </div>
    </div>

    <script>
        const app = document.getElementById('app');

        // --- LORE DATA ---
        const loreData = {
            kaan: [
                "GÖNDEREN: KAAN OĞUZ",
                "YASİN BUDAK'A RESMÎ BİLDİRİ",
                "",
                "Bu metin, sıradan bir mesaj değildir.",
                "Bu, gündüz vakti yürürlüğe giren kritik bir çağrı protokolüdür.",
                "",
                "Yarın, Ata ile birlikte uzun bir aradan sonra yeniden oyun sahasına çıkıyoruz. Bu organizasyon, basit bir eğlence faaliyeti değil; denge, uyum ve sistem bütünlüğü operasyonudur.",
                "",
                "Senin yokluğun bu yapıyı doğrudan etkiler.",
                "",
                "Eğer katılım sağlamazsan:",
                "- Takım dengesi bozulur",
                "- Oyun akışı çöker",
                "- Tarihsel süreklilik zarar görür",
                "",
                "Ve daha da önemlisi…",
                "Aykut Elmas bu durumu öğrendiği anda ciddi şekilde rahatsız olacaktır.",
                "",
                "Bu, artık kişisel bir mesele olmaktan çıkmıştır.",
                "Bu bir zorunlu katılım çağrısıdır.",
                "",
                "Güneş doğacak. Gün başlayacak. Sistem aktif olacak.",
                "Ve sen ya sistemin bir parçası olacaksın… ya da eksikliğiyle anılacaksın.",
                "",
                "Seçim sana ait değil.",
                "Gerçeklik zaten kararını vermiş durumda."
            ],
            yasin: [
                "GÖNDEREN: YASİN BUDAK",
                "DURUM: PROTOKOL ONAYLANDI",
                "",
                "Protokol tarafımca alınmış, analiz edilmiş ve onaylanmıştır.",
                "",
                "Yarın gerçekleşecek operasyon kapsamında sistem bütünlüğünün korunması adına gerekli katılım sağlanacaktır.",
                "",
                "Ata ile yeniden aynı sahada bulunmak, yalnızca bir oyun değil; geçmişten gelen düzenin yeniden aktive edilmesi anlamına gelmektedir. Bu nedenle süreç, maksimum uyum ve tam konsantrasyon ile yürütülecektir.",
                "",
                "Belirtilen risk senaryoları değerlendirilmiştir:",
                "[+] Takım dengesi korunacak.",
                "[+] Oyun akışı kesintiye uğramayacak.",
                "[+] Tarihsel süreklilik sürdürülecek.",
                "",
                "Ayrıca, Aykut Elmas'ın olası rahatsızlık durumu da göz önünde bulundurulmuş ve kriz ihtimali ortadan kaldırılmıştır.",
                "",
                "Güneş doğduğunda sistem aktif olacak.",
                "Ve ben, eksik kalan taraf değil; doğrudan sistemin çalışan parçası olarak sahada olacağım.",
                "",
                "Katılım kesinleşmiştir."
            ],
            arda: [
                "GÖNDEREN: ARDA",
                "DURUM: SİSTEM BAĞLANTISI KURULDU",
                "",
                "Protokol çağrısı tarafıma ulaşmış, çok katmanlı değerlendirme sürecinden geçirilmiş ve resmi olarak onaylanmıştır.",
                "",
                "Uzun süredir pasif durumda bulunan sistemin yeniden aktif edileceği bu operasyonun sıradan bir buluşma olmadığı açık şekilde anlaşılmıştır. Yarın gerçekleşecek saha birleşimi; yalnızca oyun oynama amacı taşımamakta, aynı zamanda geçmişten gelen düzenin, ekip senkronizasyonunun ve unutulmuş koordinasyonun yeniden kurulmasını temsil etmektedir.",
                "",
                "Bu sebeple gerekli tüm hazırlıklar başlatılmıştır.",
                "> Enerji seviyesi optimize edildi.",
                "> Zihinsel denge stabil hale getirildi.",
                "> Operasyon sırasında oluşabilecek kaos senaryolarına karşı önlemler alınmıştır.",
                "",
                "Belirtilen tehdit unsurları detaylı şekilde analiz edilmiştir:",
                "[OK] Takım dengesi korunacaktır.",
                "[OK] Oyun akışı sekteye uğramayacaktır.",
                "[OK] Tarihsel süreklilik devam edecektir.",
                "[OK] Sistemde boşluk oluşmasına izin verilmeyecektir.",
                "",
                "Ayrıca Aykut Elmas faktörü özel olarak değerlendirilmiş, olası moral çöküşü ve evrensel huzursuzluk ihtimali başarıyla engellenmiştir. Kamu düzeninin korunması adına katılım artık yalnızca bireysel tercih değil, kolektif zorunluluk statüsüne geçmiştir.",
                "",
                "Güneş yükseldiğinde süreç başlayacak.",
                "Saha aktif hale gelecek.",
                "Sesler yükselecek.",
                "Ve ben orada olacağım.",
                "",
                "Eksik kalan kişi olarak değil…",
                "Sistemin doğrudan çalışan, denge sağlayan ve operasyonu sürdüren ana parçalarından biri olarak.",
                "",
                "Katılım kesinleşmiştir.",
                "Protokol uygulanacaktır.",
                "Geri dönüş yoktur."
            ]
        };

        // --- STATE ---
        let unlockedFiles = { kaan: false, yasin: false, arda: false };
        let isTyping = false;

        // FIX #3: track the click listener so we can remove it when leaving the login view
        let loginFocusListener = null;

        // FIX #5: AudioContext created lazily on first user gesture, not at module load
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playBeep(freq = 800, duration = 0.05, vol = 0.05) {
            try {
                const ctx = getAudioCtx();
                if (ctx.state === 'suspended') ctx.resume();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(freq, ctx.currentTime);
                gainNode.gain.setValueAtTime(vol, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                oscillator.start();
                oscillator.stop(ctx.currentTime + duration);
            } catch(e) {
                // Audio not critical — silently ignore if blocked
            }
        }

        // --- UTILS ---
        const sleep = (ms) => new Promise(r => setTimeout(r, ms));

        async function typeText(element, textArray, speed = 20) {
            isTyping = true;
            element.innerHTML = '';

            for (let i = 0; i < textArray.length; i++) {
                const line = textArray[i];
                const lineDiv = document.createElement('div');
                lineDiv.className = 'min-h-[1.5rem] mb-1';
                element.appendChild(lineDiv);

                for (let j = 0; j < line.length; j++) {
                    lineDiv.innerHTML += line.charAt(j);
                    if (j % 3 === 0) playBeep(600 + Math.random() * 200, 0.02, 0.02);
                    // FIX #6: scroll the correct container (#app), not body
                    app.scrollTop = app.scrollHeight;
                    await sleep(speed);
                }
                await sleep(speed * 10);
            }
            isTyping = false;
        }

        // FIX #3: helper to cleanly remove the login focus listener
        function removeLoginFocusListener() {
            if (loginFocusListener) {
                document.removeEventListener('click', loginFocusListener);
                loginFocusListener = null;
            }
        }

        // --- VIEWS ---

        async function renderBoot() {
            app.innerHTML = `<div id="bootText"></div><span class="cursor-blink">_</span>`;
            const bootText = document.getElementById('bootText');

            const bootSequence = [
                "SİSTEM BAŞLATILIYOR...",
                "BELLEK TESTİ: OK",
                "AĞ BAĞLANTISI: GÜVENLİ KANAL OLUŞTURULDU",
                "AYKUT_ELMAS_PROTOKOLÜ.sys YÜKLENİYOR...",
                "UYARI: ANOMALİ TESPİT EDİLDİ.",
                "YETKİLENDİRME GEREKLİ."
            ];

            await typeText(bootText, bootSequence, 30);
            await sleep(500);
            renderLogin();
        }

        function renderLogin() {
            // FIX #3: clean up any previous listener before creating a new one
            removeLoginFocusListener();

            app.innerHTML = `
                <div class="mb-4">
                    <p class="text-red-500 glitch-text font-bold">&gt;&gt;&gt; GİZLİ TERMİNALE ERİŞİM SAĞLANDI &lt;&lt;&lt;</p>
                    <br>
                    <p>LÜTFEN KİMLİĞİNİZİ DOĞRULAYIN.</p>
                    <p>SADECE YETKİLİ OPERASYON YÖNETİCİSİ GİRİŞ YAPABİLİR.</p>
                </div>
                <div class="flex items-center mt-4">
                    <span class="mr-2">YÖNETİCİ ADI: </span>
                    <input type="text" id="loginInput" autocomplete="off" autofocus class="border-b border-green-500 bg-transparent w-48 text-green-500 outline-none">
                    <span class="cursor-blink ml-1">_</span>
                </div>
                <div id="loginError" class="text-red-500 mt-4 hidden">YETKİ REDDEDİLDİ. GEÇERSİZ KİMLİK.</div>
            `;

            const input = document.getElementById('loginInput');
            input.focus();

            // FIX #3: store reference so it can be removed when navigating away
            loginFocusListener = () => {
                const el = document.getElementById('loginInput');
                if (el) el.focus();
            };
            document.addEventListener('click', loginFocusListener);

            input.addEventListener('keydown', async (e) => {
                if (e.key === 'Enter') {
                    const val = input.value.trim().toLowerCase();
                    if (val === 'zaz') {
                        // FIX #3: remove listener before leaving login view
                        removeLoginFocusListener();
                        playBeep(1200, 0.1, 0.1);
                        app.innerHTML = `<div class="text-green-400 mt-10">KİMLİK DOĞRULANDI. HOŞ GELDİNİZ, YÖNETİCİ ATA.<br>SİSTEME BAĞLANILIYOR...</div>`;
                        await sleep(1500);
                        renderDashboard();
                    } else {
                        playBeep(200, 0.3, 0.1);
                        const errEl = document.getElementById('loginError');
                        if (errEl) errEl.classList.remove('hidden');
                        input.value = '';
                    }
                }
            });
        }

        function renderDashboard() {
            const allUnlocked = unlockedFiles.kaan && unlockedFiles.yasin && unlockedFiles.arda;

            let html = `
                <div class="border-b border-green-700 pb-4 mb-6">
                    <h1 class="text-3xl font-bold glitch-text">OPERASYON MERKEZİ</h1>
                    <p class="text-sm">KULLANICI: ATA | DURUM: <span class="${allUnlocked ? 'text-green-500' : 'text-yellow-500'}">${allUnlocked ? 'TAM SENKRONİZASYON' : 'BEKLEMEDE'}</span></p>
                </div>
                <p class="mb-6">Aşağıdaki saha birleşimi protokollerini inceleyin.</p>
                <div class="flex flex-col gap-4 max-w-md">
                    <button onclick="openLog('kaan')" class="btn-terminal p-4 text-left flex justify-between items-center">
                        <span>[1] ÇAĞRI PROTOKOLÜ (KAAN)</span>
                        <span class="text-xs ${unlockedFiles.kaan ? 'text-green-500' : 'text-gray-400'}">[ ${unlockedFiles.kaan ? 'OKUNDU' : 'YENİ'} ]</span>
                    </button>
                    <button onclick="openLog('yasin')" class="btn-terminal p-4 text-left flex justify-between items-center">
                        <span>[2] SİSTEM BÜTÜNLÜĞÜ (YASİN)</span>
                        <span class="text-xs ${unlockedFiles.yasin ? 'text-green-500' : 'text-gray-400'}">[ ${unlockedFiles.yasin ? 'OKUNDU' : 'YENİ'} ]</span>
                    </button>
                    <button onclick="openLog('arda')" class="btn-terminal p-4 text-left flex justify-between items-center">
                        <span>[3] KOLEKTİF ZORUNLULUK (ARDA)</span>
                        <span class="text-xs ${unlockedFiles.arda ? 'text-green-500' : 'text-gray-400'}">[ ${unlockedFiles.arda ? 'OKUNDU' : 'YENİ'} ]</span>
                    </button>
                </div>
            `;

            if (allUnlocked) {
                html += `
                    <div class="mt-12 p-6 border-2 border-green-500 bg-green-900 bg-opacity-20 animate-pulse">
                        <h2 class="text-2xl font-bold text-green-400 mb-2">&gt;&gt;&gt; TÜM BİLDİRİLER ONAYLANDI &lt;&lt;&lt;</h2>
                        <p>SİSTEM BÜTÜNLÜĞÜ %100 SAĞLANDI.</p>
                        <p>TAKIM DENGESİ: OPTİMUM.</p>
                        <p class="text-red-400 font-bold mt-2">AYKUT ELMAS RİSKİ: SIFIRLANDI.</p>
                        <br>
                        <p class="text-3xl glitch-text">SAHAYA ÇIKMAYA HAZIRIZ, ATA.</p>
                    </div>
                `;
            }

            app.innerHTML = html;

            const existingOverlay = document.getElementById('tvCloseOverlay');
            if (existingOverlay) existingOverlay.remove();

            // FIX #4: defer triggerTvCloseSequence until after the browser has painted.
            // 5 000 ms delay gives the user time to read the final message before the screen dims.
            if (allUnlocked) {
                setTimeout(() => {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            triggerTvCloseSequence();
                        });
                    });
                }, 5000);
            }
        }

        function triggerTvCloseSequence() {
            const container = document.querySelector('.tv-shell');
            if (!container || document.getElementById('tvCloseOverlay')) return;

            const overlay = document.createElement('div');
            overlay.id = 'tvCloseOverlay';
            overlay.className = 'tv-close-overlay';
            overlay.innerHTML = `
                <div class="tv-close-screen"></div>
                <div class="tv-close-content">
                    <div class="text-3xl glitch-text mb-3">SİSTEM KAPATILIYOR...</div>
                    <div class="text-sm text-green-200">TERMİNAL GÜVENLİ MODA GEÇİYOR.</div>
                    <div class="mt-4 text-xs uppercase tracking-[0.3em]">GÜÇ SÜRECİ BAŞLATILDI</div>
                </div>
            `;
            container.appendChild(overlay);

            // FIX #4: double-rAF guarantees the element is painted before we add .active
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    overlay.classList.add('active');
                });
            });

            setTimeout(() => {
                container.classList.add('power-off');
                const content = overlay.querySelector('.tv-close-content');
                if (content) {
                    content.innerHTML = `
                        <div class="text-3xl font-bold">⚠️ TV SİSTEMİ KAPANDI ⚠️</div>
                        <div class="mt-2 text-sm">Saha protokolü tamamlandı. Terminal kapanıyor...</div>
                    `;
                }
            }, 2400);
        }

        async function openLog(logName) {
            if (isTyping) return;

            app.innerHTML = `
                <div class="mb-6 flex justify-between items-center border-b border-green-700 pb-2">
                    <span class="text-sm text-gray-400">ŞİFRELİ METİN ÇÖZÜLÜYOR...</span>
                </div>
                <div id="logContent" class="whitespace-pre-wrap mb-8"></div>
                <button id="backBtn" class="btn-terminal py-2 px-6 hidden" onclick="renderDashboard()">[ ANA EKRANA DÖN ]</button>
            `;

            const logContent = document.getElementById('logContent');
            const backBtn = document.getElementById('backBtn');

            await typeText(logContent, loreData[logName], 15);

            unlockedFiles[logName] = true;
            backBtn.classList.remove('hidden');
        }

        // Start App
        window.onload = renderBoot;
    </script>
</body>
</html>
